<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="100%" height="100%">
  <defs>
    <filter id="axion-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="var(--theme-primary, #10B981)" flood-opacity="0.25"/>
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <linearGradient id="silver-slate" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E2E8F0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="dynamic-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--theme-primary, #10B981)"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>

  <g filter="url(#axion-glow)">
    <rect x="20" y="20" width="200" height="200" rx="48" fill="#090D16" stroke="rgba(255,255,255,0.03)" stroke-width="1.5"/>

    <circle cx="120" cy="120" r="76" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>
    <circle cx="120" cy="120" r="64" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1" stroke-dasharray="4 6"/>

    <path d="M76 164 L112 74 C115 66, 125 66, 128 74 L140 104" 
          fill="none" 
          stroke="url(#dynamic-accent)" 
          stroke-width="18" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>

    <path d="M164 164 L120 54 L102 96" 
          fill="none" 
          stroke="url(#silver-slate)" 
          stroke-width="18" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>

    <path d="M92 126 C105 120, 135 120, 148 126" 
          fill="none" 
          stroke="url(#dynamic-accent)" 
          stroke-width="14" 
          stroke-linecap="round"
          opacity="0.9"/>
          
    <path d="M102 126 L138 126" 
          fill="none" 
          stroke="url(#silver-slate)" 
          stroke-width="14" 
          stroke-linecap="round"/>
  </g>
</svg>
